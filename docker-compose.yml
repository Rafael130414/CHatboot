services:
  postgres:
    image: postgres:15
    container_name: chatboot-postgres
    restart: always
    environment:
      POSTGRES_USER: chatboot
      POSTGRES_PASSWORD: chatboot_password
      POSTGRES_DB: chatboot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: chatboot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./server
    container_name: chatboot-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server/sessions:/app/sessions
      - ./server/public:/app/public

  web:
    build:
      context: ./client
    container_name: chatboot-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
